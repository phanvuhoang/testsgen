version: "3.9"

services:
  # ─── Next.js Application ─────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: testsgen_app
    restart: unless-stopped
    environment:
      # Database — external PostgreSQL on VPS (10.0.1.11)
      # Format: postgresql://user:password@host:port/database
      DATABASE_URL: ${DATABASE_URL}

      # NextAuth
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_SECRET: ${NEXTAUTH_SECRET}

      # AI Provider — DeepSeek (default)
      AI_PROVIDER: ${AI_PROVIDER:-deepseek}
      AI_MODEL_GENERATION: ${AI_MODEL_GENERATION:-deepseek-v4-pro}
      AI_MODEL_GRADING: ${AI_MODEL_GRADING:-deepseek-v4-pro}

      # DeepSeek (default provider)
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}

      # OpenRouter
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODELS: ${OPENROUTER_MODELS:-xiaomi/mimo-v2-pro,qwen/qwen3-plus,anthropic/claude-haiku-4-5}

      # Anthropic
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      # OpenAI (optional)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

      # Email (optional)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@testsgen.com}

      # App
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_APP_URL: ${NEXTAUTH_URL:-http://localhost:3000}
    volumes:
      - uploads_data:/app/public/uploads
    ports:
      - "${APP_PORT:-3000}:3000"
    networks:
      - testsgen_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/auth/session || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  uploads_data:
    driver: local

networks:
  testsgen_network:
    driver: bridge
